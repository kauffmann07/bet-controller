<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BetTracker</title>

  <!-- Favicon SVG inline: gráfico de barras verde -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23047857'/%3E%3Crect x='5' y='18' width='5' height='9' rx='1.5' fill='white'/%3E%3Crect x='13.5' y='11' width='5' height='16' rx='1.5' fill='white'/%3E%3Crect x='22' y='5' width='5' height='22' rx='1.5' fill='%2386efac'/%3E%3C/svg%3E">

  <link rel="stylesheet" href="css/style.css">
  <!-- Bootstrap CSS para estilos rápidos e responsivos -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-ENjdO4Dr2bkBIFxQpeoYz1FQZ6bG1QZrE3p1Z6tZTcQmI1QmZ6C9YkF+0U8B+4dY" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app">

  <nav id="nav">
    <div class="logo">BET<span>TRACKER</span></div>
    <div class="nav-links">
      <button data-rota="analises">Análises</button>
      <button data-rota="abertas">Apostas Abertas</button>
      <button data-rota="banca">Banca</button>
      <button data-rota="dashboard">Dashboard</button>
      <button data-rota="historico">Histórico</button>
      <button data-rota="nova-aposta">+ Nova Aposta</button>
    </div>
    <div class="saldo-nav">
      <span style="color:var(--muted);font-size:.68rem;font-weight:600;letter-spacing:.06em">SALDO</span>
      <span class="val" id="nav-saldo">R$ —</span>
    </div>
  </nav>

  <main id="main">
    <section id="sec-dashboard"   class="section"><div style="text-align:center;padding:60px;color:var(--muted)">Carregando...</div></section>
    <section id="sec-nova-aposta" class="section"><div style="text-align:center;padding:60px;color:var(--muted)">Carregando...</div></section>
    <section id="sec-historico"   class="section"><div style="text-align:center;padding:60px;color:var(--muted)">Carregando...</div></section>
    <section id="sec-analises"    class="section"><div style="text-align:center;padding:60px;color:var(--muted)">Carregando...</div></section>
    <section id="sec-banca"       class="section"><div style="text-align:center;padding:60px;color:var(--muted)">Carregando...</div></section>
    <section id="sec-abertas"    class="section"><div style="text-align:center;padding:40px;color:var(--muted)">Carregando apostas abertas...</div></section>
    <!-- config page removed -->
  </main>
</div>

<div id="toast-container"></div>

<!-- Modal custom único para confirmações e prompts (padronizado) -->
<div id="custom-modal" class="modal-overlay">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <span class="modal-title" id="custom-modal-title">Confirmação</span>
      <button class="btn-ghost btn" onclick="closeCustomModal()">✕</button>
    </div>
    <div id="custom-modal-body" style="font-size:.95rem;color:var(--text2)"></div>
    <div id="custom-modal-actions" style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px"></div>
  </div>
</div>

<script src="data/esportes.js"></script>
<script src="js/db.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/form.js"></script>
<script src="js/historico.js"></script>
<script src="js/abertas.js"></script>
<script src="js/analises.js"></script>
<script src="js/banca.js"></script>

<!-- Bootstrap JS (bundle com Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Q3o6kR7QmYc0XK2sH/6Zl3e8gqF6r6a9K1Zl6Y5qZQ1s2QmE3V9Y8w/1qz3b2V9e" crossorigin="anonymous"></script>

</body>
</html>
